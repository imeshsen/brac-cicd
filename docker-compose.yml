services:
  jenkins:
    image: jenkins:1.0
    build: jenkins_container
    container_name: jenkins
    restart: always
    privileged: true
    env_file:
      - .env
    environment:
      TZ: "Asia/Colombo"
    ports:
      - "8080:8080"
      - "50000:50000"
    networks:
      - jenkins
    volumes:
      - ./jenkins-data:/var/jenkins_home
      - ./jenkins-backup:/var/jenkins_home/jenkins_backup
      - ./jenkins-docker-certs:/certs/client:ro

networks:
  jenkins:
